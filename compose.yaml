# =============================================================================
# Media-App — Docker Compose
#
# Services:
#   app     — PHP 8.3-FPM (Laravel application server)
#   nginx   — Web server; proxies HTTP to app:9000
#   mysql   — MySQL 8.4 (primary database)
#   redis   — Redis 7.2 (queue driver, cache, session store)
#   soketi  — Self-hosted Pusher-protocol WebSocket server
#   horizon — Laravel Horizon queue worker supervisor
#
# Usage:
#   docker compose up -d          # Start all services
#   docker compose exec app bash  # Open shell in the app container
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # app — PHP-FPM application server
  # Handles all PHP processing. Nginx forwards .php requests here on port 9000.
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    # Name the built image so the `horizon` service can reuse it without
    # triggering a second build.
    image: mediaflow/app
    restart: unless-stopped
    volumes:
      # Bind-mount the entire project so code changes are reflected immediately.
      - .:/var/www/html
    networks:
      - mediaflow
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # PHP-FPM should not be exposed on a host port — only nginx talks to it.
      APP_ENV: "${APP_ENV:-local}"

  # ---------------------------------------------------------------------------
  # nginx — HTTP server
  # Serves static assets directly; proxies PHP requests to the app container.
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      # Project files — nginx needs access to /public for static asset serving.
      - .:/var/www/html:ro
      # Custom server block.
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - mediaflow
    depends_on:
      - app

  # ---------------------------------------------------------------------------
  # mysql — Relational database (MySQL 8.4)
  # ---------------------------------------------------------------------------
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    ports:
      # Expose on host for direct inspection with a DB client (e.g. TablePlus).
      - "${FORWARD_DB_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD}"
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: "${DB_DATABASE}"
      MYSQL_USER: "${DB_USERNAME}"
      MYSQL_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - mediaflow-mysql:/var/lib/mysql
    networks:
      - mediaflow
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-p${DB_PASSWORD}"]
      interval: 10s
      retries: 5
      timeout: 5s

  # ---------------------------------------------------------------------------
  # redis — In-memory store (Redis 7.2)
  # Used for: queue driver, cache store, session driver, Horizon metrics.
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    ports:
      - "${FORWARD_REDIS_PORT:-6379}:6379"
    volumes:
      - mediaflow-redis:/data
    networks:
      - mediaflow
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5
      timeout: 5s

  # ---------------------------------------------------------------------------
  # soketi — Self-hosted Pusher-compatible WebSocket server (v1.6)
  # Laravel Broadcasting connects to this via the `pusher` driver.
  # Browser clients connect via Laravel Echo + pusher-js.
  # ---------------------------------------------------------------------------
  soketi:
    image: quay.io/soketi/soketi:1.6-16-alpine
    restart: unless-stopped
    ports:
      # WebSocket port — browser clients and Laravel connect here.
      - "${SOKETI_PORT:-6001}:6001"
      # Prometheus metrics endpoint — optional, for observability.
      - "${SOKETI_METRICS_PORT:-9601}:9601"
    environment:
      SOKETI_DEFAULT_APP_ID:      "${PUSHER_APP_ID}"
      SOKETI_DEFAULT_APP_KEY:     "${PUSHER_APP_KEY}"
      SOKETI_DEFAULT_APP_SECRET:  "${PUSHER_APP_SECRET}"
      SOKETI_DEFAULT_APP_MAX_CONNS: "100"
      # Bind to all interfaces so the port mapping is reachable from the host.
      SOKETI_HOST:                "0.0.0.0"
      # Set to "1" to enable verbose connection and event logging.
      SOKETI_DEBUG: "${SOKETI_DEBUG:-0}"
    networks:
      - mediaflow

  # ---------------------------------------------------------------------------
  # horizon — Laravel Horizon queue worker supervisor
  # Runs the same image as `app` but executes `php artisan horizon` instead of
  # php-fpm. All queue processing (resize, thumbnail, optimise jobs) runs here.
  # ---------------------------------------------------------------------------
  horizon:
    # Reuse the image built by the `app` service — no separate build needed.
    image: mediaflow/app
    restart: unless-stopped
    command: ["php", "artisan", "horizon"]
    volumes:
      - .:/var/www/html
    networks:
      - mediaflow
    depends_on:
      app:
        condition: service_started
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    # If Redis loses Horizon's keys (e.g. after a Redis restart), the horizon
    # process stays alive but stops accepting jobs — horizon:status reports
    # inactive. The healthcheck detects this and calls `kill 1`, which exits
    # the container and lets `restart: unless-stopped` bring it back clean.
    healthcheck:
      test: ["CMD-SHELL", "php artisan horizon:status | grep -q running || kill 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

# =============================================================================
# Networks
# =============================================================================
networks:
  mediaflow:
    driver: bridge

# =============================================================================
# Named volumes — persist data across container restarts
# =============================================================================
volumes:
  mediaflow-mysql:
    driver: local
  mediaflow-redis:
    driver: local
