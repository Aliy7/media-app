name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-22.04
    environment: testing

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: 1
          MYSQL_DATABASE: testing
          MYSQL_USER: mediaflow
          MYSQL_PASSWORD: ""
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      soketi:
        image: quay.io/soketi/soketi:1.6-16-alpine
        env:
          SOKETI_DEFAULT_APP_ID: mediaflow-app-id
          SOKETI_DEFAULT_APP_KEY: mediaflow-app-key
          SOKETI_DEFAULT_APP_SECRET: mediaflow-app-secret
          SOKETI_DEFAULT_APP_MAX_CONNS: "100"
          SOKETI_HOST: 0.0.0.0
        ports:
          - 6001:6001

    env:
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: testing
      DB_USERNAME: root
      DB_PASSWORD: ""
      DB_URL: ""
      REDIS_CLIENT: phpredis
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      QUEUE_CONNECTION: sync
      BROADCAST_CONNECTION: log
      CACHE_STORE: array
      SESSION_DRIVER: array
      PUSHER_APP_ID: mediaflow-app-id
      PUSHER_APP_KEY: mediaflow-app-key
      PUSHER_APP_SECRET: mediaflow-app-secret
      PUSHER_HOST: 127.0.0.1
      PUSHER_PORT: 6001
      PUSHER_SCHEME: http

    steps:
      - uses: actions/checkout@v4

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            mysqladmin ping -h 127.0.0.1 -P 3306 -u root --silent 2>/dev/null && echo "MySQL ready" && break
            echo "Waiting for MySQL ($i/30)..."
            sleep 2
          done

      - name: Wait for Soketi
        run: |
          for i in {1..30}; do
            (echo > /dev/tcp/127.0.0.1/6001) >/dev/null 2>&1 && echo "Soketi ready" && break
            echo "Waiting for Soketi ($i/30)..."
            sleep 2
          done

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_mysql, gd, redis, bcmath, zip, exif, pcntl, intl, opcache
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Setup environment
        run: |
          cp .env.example .env
          php artisan key:generate --ansi --force

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run test suite
        run: php artisan test
