; =============================================================================
; MediaFlow — PHP Runtime Configuration
; Loaded by the mediaflow/app container via /usr/local/etc/php/conf.d/
; =============================================================================

; -----------------------------------------------------------------------------
; Upload limits
; Max upload per spec is 10 MB. Set ceiling 20% above to avoid PHP rejecting
; requests before Laravel validation runs and can return a proper 422 response.
; -----------------------------------------------------------------------------
upload_max_filesize = 12M
post_max_size       = 12M

; -----------------------------------------------------------------------------
; Execution and memory
; Image processing via Imagick can be memory-intensive on large files.
; 256 MB gives headroom for resize + thumbnail + optimise in a single request.
; Timeout matches job $timeout = 120 defined in the queue job classes.
; -----------------------------------------------------------------------------
max_execution_time = 120
memory_limit       = 256M

; -----------------------------------------------------------------------------
; OPcache — improves PHP performance by caching compiled bytecode
; validate_timestamps = 1 ensures code changes are picked up without restart
; (appropriate for development; set to 0 in production for max performance)
; -----------------------------------------------------------------------------
[opcache]
opcache.enable                 = 1
opcache.memory_consumption     = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files  = 10000
opcache.validate_timestamps    = 1
opcache.revalidate_freq        = 2
opcache.save_comments          = 1
