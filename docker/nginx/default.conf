# =============================================================================
# MediaFlow — Nginx Server Configuration
#
# Routes all HTTP traffic to the `app` PHP-FPM container on port 9000.
# The document root is Laravel's /public directory.
# =============================================================================

server {
    listen 80;
    server_name localhost;

    # Laravel's public directory is the document root.
    # All requests are routed through index.php (the front controller).
    root  /var/www/html/public;
    index index.php;

    # Increase body size to match PHP upload limit (12 M in php.ini).
    # Nginx rejects requests above this before they reach PHP.
    client_max_body_size 12M;

    # --------------------------------------------------------------------------
    # Request routing
    # Serve static files directly; fall back to index.php for all other routes.
    # --------------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # --------------------------------------------------------------------------
    # PHP-FPM passthrough
    # Forward .php requests to the `app` container (service name resolves via
    # Docker's internal DNS on the mediaflow network).
    # --------------------------------------------------------------------------
    location ~ \.php$ {
        fastcgi_pass            app:9000;
        fastcgi_index           index.php;
        fastcgi_param           SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include                 fastcgi_params;

        # Do not expose the PHP version in response headers.
        fastcgi_hide_header     X-Powered-By;

        # Timeouts aligned with PHP max_execution_time (120 s).
        fastcgi_read_timeout    120s;
        fastcgi_send_timeout    120s;
    }

    # --------------------------------------------------------------------------
    # Deny access to hidden files (e.g. .env, .git, .htaccess)
    # --------------------------------------------------------------------------
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # --------------------------------------------------------------------------
    # Security headers
    # --------------------------------------------------------------------------
    add_header X-Frame-Options    "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"  always;
    add_header Referrer-Policy    "strict-origin-when-cross-origin" always;

    # --------------------------------------------------------------------------
    # Gzip compression — reduces transfer size for JS/CSS/JSON responses
    # --------------------------------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        image/svg+xml;
}
